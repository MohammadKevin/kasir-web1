name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build and Restart Next.js
        run: |
          cd /var/www/kasir-frontend
          git pull origin main
          npm install
          NODE_OPTIONS="--max-old-space-size=1024" npm run build
          PORT=3001 pm2 restart kasir-frontend --update-env
